name: asl_recognition
description: "Aplicacion Flutter de reconocimiento de lenguaje de senas ASL con GetX, arquitectura limpia y backend MediaPipe + SigLIP2."
publish_to: 'none'

version: 3.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Gestion de estado, dependencias y rutas
  get: ^4.6.6

  # Cliente HTTP para el servidor de reconocimiento
  http: ^1.1.0

  # Sintesis de voz (TTS) para pronunciar la palabra formada
  flutter_tts: ^4.0.2

  # Camara y permisos
  camera: ^0.10.5
  permission_handler: ^12.0.1

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
